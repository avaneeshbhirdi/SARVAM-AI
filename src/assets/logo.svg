<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="t1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8450E"/>
      <stop offset="100%" stop-color="#F2960D"/>
    </linearGradient>
    <linearGradient id="t2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F2960D"/>
      <stop offset="100%" stop-color="#D4820A"/>
    </linearGradient>
    <linearGradient id="t3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8450E"/>
      <stop offset="50%" stop-color="#F2960D"/>
      <stop offset="100%" stop-color="#0EA5A0"/>
    </linearGradient>
    <linearGradient id="t4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0EA5A0"/>
      <stop offset="100%" stop-color="#34D1B5"/>
    </linearGradient>
    <linearGradient id="t5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B8C87"/>
      <stop offset="100%" stop-color="#0EA5A0"/>
    </linearGradient>
    <linearGradient id="t6" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E8450E"/>
      <stop offset="100%" stop-color="#C73A0B"/>
    </linearGradient>
  </defs>

  <!-- Background: website paper color -->
  <rect width="512" height="512" rx="112" ry="112" fill="#F7F6F3"/>

  <!-- === OUTER RING — Thread arcs (multiple concentric lines) === -->
  <!-- Ring thread 1 — outermost, coral -->
  <circle cx="256" cy="256" r="155" fill="none" stroke="url(#t1)" stroke-width="2.5" opacity="0.35"/>
  <circle cx="256" cy="256" r="150" fill="none" stroke="url(#t6)" stroke-width="3" opacity="0.5"/>
  <circle cx="256" cy="256" r="145" fill="none" stroke="url(#t1)" stroke-width="3.5" opacity="0.7"/>

  <!-- Ring thread 2 — coral to amber transition -->
  <circle cx="256" cy="256" r="139" fill="none" stroke="url(#t3)" stroke-width="4" opacity="0.85"/>

  <!-- Ring thread 3 — main ring, full gradient -->
  <circle cx="256" cy="256" r="132" fill="none" stroke="url(#t3)" stroke-width="5"/>

  <!-- Ring thread 4 — amber to teal -->
  <circle cx="256" cy="256" r="125" fill="none" stroke="url(#t2)" stroke-width="4" opacity="0.85"/>

  <!-- Ring thread 5 — teal family -->
  <circle cx="256" cy="256" r="119" fill="none" stroke="url(#t4)" stroke-width="3.5" opacity="0.7"/>
  <circle cx="256" cy="256" r="114" fill="none" stroke="url(#t5)" stroke-width="3" opacity="0.5"/>
  <circle cx="256" cy="256" r="110" fill="none" stroke="url(#t4)" stroke-width="2.5" opacity="0.3"/>

  <!-- === WAVY THREAD ARCS === -->
  <path d="M120,220 Q180,100 256,95 Q332,100 392,220" fill="none" stroke="url(#t1)" stroke-width="2.5" stroke-linecap="round" opacity="0.4"/>
  <path d="M115,230 Q178,105 256,100 Q334,105 397,230" fill="none" stroke="url(#t3)" stroke-width="3" stroke-linecap="round" opacity="0.3"/>

  <!-- Bottom arcs -->
  <path d="M120,292 Q180,412 256,417 Q332,412 392,292" fill="none" stroke="url(#t4)" stroke-width="2.5" stroke-linecap="round" opacity="0.4"/>
  <path d="M115,282 Q178,407 256,412 Q334,407 397,282" fill="none" stroke="url(#t5)" stroke-width="3" stroke-linecap="round" opacity="0.3"/>

  <!-- === CROSS THREADS === -->
  <path d="M105,240 Q180,230 256,235 Q332,240 407,230" fill="none" stroke="url(#t1)" stroke-width="2" stroke-linecap="round" opacity="0.2"/>
  <path d="M105,280 Q180,290 256,285 Q332,280 407,290" fill="none" stroke="url(#t4)" stroke-width="2" stroke-linecap="round" opacity="0.2"/>

  <!-- === EYES === -->
  <!-- Dark eyes on the light background -->
  <rect x="215" y="232" width="10" height="38" rx="5" ry="5" fill="#0D0D0D" opacity="0.95"/>
  <rect x="287" y="232" width="10" height="38" rx="5" ry="5" fill="#0D0D0D" opacity="0.95"/>
</svg>
